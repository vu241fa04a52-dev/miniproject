<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let marks = prompt("Enter marks:")
        if (marks>=90){
            console.log("GradeA");
        }
        else if (marks >= 80 && marks<90){
            console.log("GradeB");
        }
        else if (marks >= 70 && marks<80){
            console.log("GradeC");
        }
        else{
            console.log("GradeD");
        }
    </script>
</body>
</html>
